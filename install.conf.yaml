- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- create:
    - ~/.config/btop

- link:
    # bash
    ~/.bash_profile:                bash/bash_profile
    ~/.bashrc:                      bash/bashrc

    # btop
    ~/.config/btop/btop.conf:       btop/btop.conf

    # git
    ~/.gitconfig:                   git/gitconfig

    # tmux
    ~/.tmux.conf:                   tmux/tmux.conf

    # top
    ~/.toprc:                       top/toprc

    # zsh
    ~/.zshrc:                        zsh/zshrc
    ~/.zprofile:                     zsh/zprofile
    
- shell:
    - [git submodule update --init --recursive, Installing submodules]
