- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- create:
    - ~/.config/btop

- link:
    # bash
    ~/.bash_profile:                bash/bash_profile
    ~/.bashrc:                      bash/bashrc

    # btop
    ~/.config/btop/btop.conf:       btop/btop.conf

    # tmux
    ~/.tmux.conf:                   tmux/tmux.conf

    # top
    ~/.toprc:                       top/toprc
    
    
- shell:
    - [git submodule update --init --recursive, Installing submodules]
