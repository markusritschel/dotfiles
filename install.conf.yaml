- defaults:
    link:
      relink: true
      create: true

- clean: ['~', '~/bin']

- create:
    - ~/bin
    - ~/.config/btop
    - ~/.config/micro
    - ~/.tmux/plugins/tpm

- link:
    # bash
    ~/.bash_profile:                bash/bash_profile
    ~/.bashrc:                      bash/bashrc

    # bin
    ~/bin/:
        force: true
        glob: true
        path: bin/*

    # btop
    ~/.config/btop/btop.conf:       btop/btop.conf

    # claude
    ~/.claude/hooks:
        force: true
        glob: true
        path: claude/hooks/*.sh
    ~/.claude/settings.json:        claude/settings.json

    # git
    ~/.gitconfig:                   git/gitconfig

    # espanso
    ~/.config/espanso/config/default.yml:  espanso/config/default.yml
    ~/.config/espanso/match/base.yml:  espanso/match/base.yml

    # micro
    ~/.config/micro/settings.json:  micro/settings.json

    # mise
    ~/.config/mise/config.toml:     mise/config.toml

    # tmux
    ~/.tmux.conf:                   tmux/tmux.conf

    # top
    ~/.toprc:                       top/toprc

    # zsh
    ~/.zshrc:                       zsh/zshrc
    ~/.zprofile:                    zsh/zprofile
    ~/.oh-my-zsh/custom/themes/:
        force: true
        glob:  true
        path:  zsh/oh-my-zsh/custom/themes/*
    
- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [rm -r ~/.tmux/plugins/tpm && git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm, Install tmux plugins]
    - description: "Linking docker.json to /etc/docker/docker.json"
      command: sudo mkdir -p /etc/docker && sudo ln -sf "$HOME/.dotfiles/docker/daemon.json" /etc/docker/daemon.json
      # Following https://www.erikdonner.dev/2024/11/01/wlan-im-ice-mit-linux-und-docker/
